# Dialect
# Describes semantic meta-features important for interpretation

# Composition types
# Define composition types for elements of each language level
# First type whose restirctions are cleared by an element is assigned to it

# Every type can have the following restrictions:
# - Rank restriction (mandatory) - ranks: 
# -- Defines which nodes on each rank can be populated using special characters:
# -- '*' means no restriction
# -- '+' means the node must be populated
# -- '-' means the node must not be populated
# -- An integer means the number of populated compounds plus one the node must have
# -- If an element of the rank restriction is empty, no restriction is applied
# - Embedding restriction (optional, only for embedded types) - cpos:
# -- Defines the embedding position of the tree that contains the node
# -- Content type: non-negative integers
# - Compounding restriction  (optional, only for embedded types) - crep:
# -- Defines the compounding position of the tree that contains the node
# -- Content type: non-negative integers

# Shape:
# - Depth 1: number of language levels
# - Depth 2: any
# - Depth 3: any
# - Depth 4: (equally for every restriction): number of ranks within level
# Index correspondence:
# - Depth 1: language level
# - Depth 2: embedding depth
# - Depth 3: composition type priority
# - Depth 4 (equally for every restriction): rank number

ctypes:
- '':
    Proform:
      ranks: [ '', '*+-*', '' ]
    Conjunction:
      ranks: [ '', '*-+*', '' ]
    Content word:
      ranks: [ '', '*++*', '' ]
  '1':
    Modulator:
      ranks: [ '', '-*1-', '' ]
      cpos: [ 0, 0, 0 ]
    Connector:
      ranks: [ '', '11--', '' ]
      cpos: [ 0, 0, 1 ]
    Classifier:
      ranks: [ '', '--11', '' ]
      cpos: [ 1, 1, 1 ]
    Determiner:
      ranks: [ '', '-1*-', '' ]
      cpos: [ 1, 1, 0 ]
- '':
    Predicate-only:
      ranks: [ '', '+-', '' ]
    Full sentence:
      ranks: [ '', '++', '' ]
- '':
    Text:
      ranks: [ '' ]

# Permutation types
# Define permutation types for the elements of the bottom level
# Last type whose restirctions are cleared by an element is assigned to it

# Permutation restrictions only involve swapping records - swaps
# Every swap restriction is a set of pairs with node indexes of swapped tokens
# The actual pairs of swapped tokens must match the restriction exactly
# Empty restriction means no swaps are allowed

ptypes:
- Neutral:
    swaps: []
- Concordant:
    swaps: [ [ 3, 4 ] ]
- Discordant:
    swaps: [ [ 5, 6 ] ]
